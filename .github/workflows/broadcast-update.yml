name: Broadcast update

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  telegram:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send update summary
        env:
          APP_URL: ${{ secrets.APP_URL }}
          UPDATE_BROADCAST_SECRET: ${{ secrets.UPDATE_BROADCAST_SECRET }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$UPDATE_BROADCAST_SECRET" ]; then
            echo "APP_URL or UPDATE_BROADCAST_SECRET is missing. Skipping broadcast."
            exit 0
          fi

          node --input-type=module <<'NODE'
          const appUrl = process.env.APP_URL.replace(/\/$/, "");
          const message = `یه آپدیت جدید برای Finanzmanager منتشر شد:

          ${process.env.COMMIT_MESSAGE || "Update"}`;

          const response = await fetch(`${appUrl}/api/telegram/broadcast`, {
            body: JSON.stringify({ title: "Finanzmanager Update", message }),
            headers: {
              "Content-Type": "application/json",
              "x-broadcast-secret": process.env.UPDATE_BROADCAST_SECRET
            },
            method: "POST"
          });

          const body = await response.text();
          console.log(body);

          if (!response.ok) {
            process.exit(1);
          }
          NODE
