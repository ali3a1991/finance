name: Broadcast release update

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.1.0"
        required: true
        type: string
      german_summary:
        description: "Mehrzeilige Update-Zusammenfassung auf Deutsch"
        required: true
        type: string
      english_summary:
        description: "Multiline update summary in English"
        required: true
        type: string

jobs:
  telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send release update summary
        env:
          APP_URL: ${{ secrets.APP_URL }}
          UPDATE_BROADCAST_SECRET: ${{ secrets.UPDATE_BROADCAST_SECRET }}
          RELEASE_VERSION: ${{ inputs.version }}
          GERMAN_SUMMARY: ${{ inputs.german_summary }}
          ENGLISH_SUMMARY: ${{ inputs.english_summary }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$UPDATE_BROADCAST_SECRET" ]; then
            echo "APP_URL or UPDATE_BROADCAST_SECRET is missing. Skipping broadcast."
            exit 0
          fi

          node --input-type=module <<'NODE'
          const appUrl = process.env.APP_URL.replace(/\/$/, "");
          const version = process.env.RELEASE_VERSION?.trim() || "unknown";
          const german = process.env.GERMAN_SUMMARY?.trim();
          const english = process.env.ENGLISH_SUMMARY?.trim();

          if (!german || !english) {
            console.error("German and English release summaries are required.");
            process.exit(1);
          }

          const message = `FyNest v${version}

Deutsch
${german}

English
${english}`;

          const response = await fetch(`${appUrl}/api/telegram/broadcast`, {
            body: JSON.stringify({ title: `FyNest v${version}`, message }),
            headers: {
              "Content-Type": "application/json",
              "x-broadcast-secret": process.env.UPDATE_BROADCAST_SECRET
            },
            method: "POST"
          });

          const body = await response.text();
          console.log(body);

          if (!response.ok) {
            process.exit(1);
          }
          NODE
